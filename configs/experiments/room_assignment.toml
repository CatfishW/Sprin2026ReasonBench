[dataset]
kind = "room_assignment"
local_path = "sample_data/room_assignment.jsonl"
split = "train"
limit = 3
shuffle = false
seed = 7

[client]
kind = "openai_compatible"
base_url = "https://game.agaii.org/llm/v1/chat/completions"
model = "/home/tang/Models/Qwen3.5-4B"
api_key_env = "OPENAI_API_KEY"
default_temperature = 1.0
default_max_tokens = 32768
max_retries = 3
min_request_interval_s = 0.1
loop_retries = 2

[client.extra_payload]
top_p = 0.95
top_k = 20
presence_penalty = 1.5
repetition_penalty = 1.0

[client.extra_payload.extra_body]
thinking_budget = 512

[run]
experiment_name = "room_assignment_demo"
max_workers = 2
strict_benchmark_mode = true
enable_cache = true
enable_checkpoint = true
enable_leakage_check = true

[output]
output_dir = "outputs/room_assignment"
cache_path = "outputs/room_assignment/cache.sqlite"
checkpoint_path = "outputs/room_assignment/results.jsonl"
summary_path = "outputs/room_assignment/summary.csv"
manifest_path = "outputs/room_assignment/manifest.json"

[strategies.direct]
enabled = true

[strategies.concise_cot]
enabled = true

[strategies.self_verify]
enabled = true

[strategies.budgeted_cascade]
enabled = true
