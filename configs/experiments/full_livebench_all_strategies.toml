[dataset]
kind = "livebench"
local_path = "data/livebench"
split = "test"
shuffle = false
seed = 13

[client]
kind = "openai_compatible"
base_url = "https://game.agaii.org/mllm/v1/chat/completions"
model = "Qwen/Qwen3.5-27B-FP8"
api_key_env = "OPENAI_API_KEY"
default_temperature = 1.0
default_max_tokens = 4096
max_retries = 3
min_request_interval_s = 0.1
loop_retries = 2

[client.extra_payload]
top_p = 0.95
top_k = 20
presence_penalty = 1.5
repetition_penalty = 1.0

[client.extra_payload.extra_body]
thinking_budget = 512

[run]
experiment_name = "livebench_full_all_strategies"
max_workers = 3
strict_benchmark_mode = true
enable_cache = true
enable_checkpoint = true
enable_leakage_check = true

[output]
output_dir = "outputs/full_livebench"
cache_path = "outputs/full_livebench/cache.sqlite"
checkpoint_path = "outputs/full_livebench/results.jsonl"
summary_path = "outputs/full_livebench/summary.csv"
manifest_path = "outputs/full_livebench/manifest.json"

[strategies.direct]
enabled = true

[strategies.concise_cot]
enabled = true

[strategies.least_to_most]
enabled = true

[strategies.constraint_decompose]
enabled = true

[strategies.self_verify]
enabled = true

[strategies.critique_refine]
enabled = true

[strategies.self_consistency]
enabled = true
num_samples = 3
temperature = 0.7

[strategies.selective_self_consistency]
enabled = true
num_samples = 3
temperature = 0.7

[strategies.budgeted_cascade]
enabled = true

[strategies.few_shot_exemplar]
enabled = true
demo_path = "data/external_demos/general_reasoning.jsonl"
