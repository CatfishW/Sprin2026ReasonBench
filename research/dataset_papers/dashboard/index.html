<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dataset Papers Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Dataset Papers Dashboard</h1>
      <p>Interactive explorer for the combined paper catalog across TruthfulQA, LiveBench, AI2-ARC, and room-assignment-related benchmarks.</p>
      <div class="meta-row">
        <span id="metaTotal">Total: --</span>
        <span id="metaShown">Shown: --</span>
      </div>
    </header>

    <section class="panel filters">
      <div class="field">
        <label for="datasetFilter">Dataset</label>
        <select id="datasetFilter">
          <option value="all">All datasets</option>
        </select>
      </div>
      <div class="field">
        <label for="yearFilter">Year</label>
        <select id="yearFilter">
          <option value="all">All years</option>
        </select>
      </div>
      <div class="field">
        <label for="statusFilter">Download status</label>
        <select id="statusFilter">
          <option value="all">All statuses</option>
        </select>
      </div>
      <div class="field grow">
        <label for="searchInput">Search title/model/results</label>
        <input id="searchInput" type="text" placeholder="Type to filter..." />
      </div>
      <div class="field checkbox-field">
        <label>
          <input id="downloadedOnly" type="checkbox" />
          Downloaded only
        </label>
      </div>
      <button id="resetBtn" type="button" class="btn">Reset</button>
    </section>

    <section class="panel table-wrap">
      <table>
        <thead>
          <tr>
            <th>Dataset</th>
            <th>Title</th>
            <th>Year</th>
            <th>Venue/Source</th>
            <th>Model/System</th>
            <th>Results</th>
            <th>Status</th>
            <th>Links</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="8">Loading catalog...</td></tr>
        </tbody>
      </table>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
