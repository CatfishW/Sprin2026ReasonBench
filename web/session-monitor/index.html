<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spring 2026 ReasonBench Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="paper-noise" aria-hidden="true"></div>
  <main class="page">
    <section class="title-card card">
      <p class="kicker">Spring 2026</p>
      <h1>ReasonBench Live Sessions</h1>
      <p class="subtitle">Full datasets, all strategies, resumable screen runs</p>
      <div class="overall-wrap">
        <div class="overall-row">
          <span>Overall Progress</span>
          <strong id="overallPct">0%</strong>
        </div>
        <div class="progress-track"><div id="overallBar" class="progress-bar"></div></div>
        <p id="overallCounts" class="mono">0 / 0 records</p>
      </div>
      <p id="generatedAt" class="mono small">Last update: --</p>
    </section>

    <section id="sessionGrid" class="session-grid" aria-live="polite"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
